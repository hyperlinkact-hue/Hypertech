<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hyper Link — QR Code Generator</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #f4f6fb;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
    }

    .card {
      background: #fff;
      border-radius: 18px;
      box-shadow: 0 4px 32px rgba(0,0,0,0.10);
      padding: 32px 28px 28px;
      width: 100%;
      max-width: 420px;
    }

    .logo {
      text-align: center;
      margin-bottom: 22px;
    }
    .logo h1 {
      font-size: 1.35rem;
      font-weight: 700;
      color: #1a1a2e;
      letter-spacing: 0.5px;
    }
    .logo p {
      font-size: 0.78rem;
      color: #888;
      margin-top: 3px;
    }

    /* Input */
    .input-wrap {
      display: flex;
      align-items: center;
      border: 1.5px solid #e0e0e0;
      border-radius: 10px;
      overflow: hidden;
      background: #fafafa;
      margin-bottom: 14px;
      transition: border-color 0.2s;
    }
    .input-wrap:focus-within { border-color: #4361ee; }
    .input-wrap span {
      padding: 0 10px;
      font-size: 1rem;
      color: #aaa;
    }
    .input-wrap input {
      flex: 1;
      border: none;
      outline: none;
      background: transparent;
      padding: 12px 10px 12px 0;
      font-size: 0.93rem;
      color: #222;
    }
    .input-wrap input::placeholder { color: #bbb; }

    /* Color Themes */
    .theme-label {
      font-size: 0.75rem;
      font-weight: 600;
      color: #666;
      margin-bottom: 8px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }
    .theme-row {
      display: flex;
      gap: 10px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }
    .theme-dot {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      cursor: pointer;
      border: 3px solid transparent;
      transition: transform 0.15s, border-color 0.15s;
      position: relative;
    }
    .theme-dot:hover { transform: scale(1.15); }
    .theme-dot.active {
      border-color: #222;
      transform: scale(1.18);
    }
    .theme-dot.active::after {
      content: '✓';
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.65rem;
      color: #fff;
      font-weight: 700;
    }

    /* Generate Button */
    .btn-gen {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 10px;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.5px;
      transition: opacity 0.2s, transform 0.15s;
      margin-bottom: 0;
    }
    .btn-gen:hover { opacity: 0.88; transform: translateY(-1px); }
    .btn-gen:active { transform: translateY(0); }

    /* QR Result */
    .qr-result {
      display: none;
      flex-direction: column;
      align-items: center;
      margin-top: 24px;
      padding-top: 22px;
      border-top: 1px solid #f0f0f0;
      animation: fadeUp 0.4s ease;
    }
    .qr-result.show { display: flex; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .qr-box {
      background: #fff;
      border-radius: 12px;
      padding: 14px;
      box-shadow: 0 2px 16px rgba(0,0,0,0.10);
      margin-bottom: 14px;
      display: inline-block;
    }
    #qrCanvas { display: block; }

    .qr-url {
      font-size: 0.72rem;
      color: #999;
      word-break: break-all;
      text-align: center;
      max-width: 260px;
      margin-bottom: 14px;
      line-height: 1.4;
    }

    /* Download buttons */
    .dl-row {
      display: flex;
      gap: 8px;
      width: 100%;
    }
    .btn-dl {
      flex: 1;
      padding: 10px 8px;
      border: none;
      border-radius: 9px;
      font-size: 0.82rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.15s;
      letter-spacing: 0.3px;
    }
    .btn-dl:hover { opacity: 0.85; transform: translateY(-1px); }
    .btn-png { background: #e8f0fe; color: #4361ee; }
    .btn-jpg { background: #4361ee; color: #fff; }

    /* Clear button */
    .btn-clear {
      margin-top: 10px;
      background: none;
      border: none;
      color: #bbb;
      font-size: 0.78rem;
      cursor: pointer;
      text-decoration: underline;
      transition: color 0.2s;
    }
    .btn-clear:hover { color: #e74c3c; }

    /* Footer */
    .footer {
      margin-top: 18px;
      font-size: 0.7rem;
      color: #ccc;
      text-align: center;
    }

    @media (max-width: 480px) {
      .card { padding: 22px 16px 20px; }
    }
  </style>
</head>
<body>

<div class="card">

  <!-- Logo -->
  <div class="logo">
    <h1>⚡ Hyper Link</h1>
    <p>Paste any link → Get instant QR Code</p>
  </div>

  <!-- URL Input -->
  <div class="input-wrap">
    <span>🔗</span>
    <input type="url" id="urlInput" placeholder="Paste your link here..." autocomplete="off" spellcheck="false" />
  </div>

  <!-- Color Theme -->
  <div class="theme-label">QR Color Theme</div>
  <div class="theme-row" id="themeRow">
    <div class="theme-dot active" data-color="#000000" style="background:#000000" title="Classic Black"></div>
    <div class="theme-dot" data-color="#4361ee" style="background:#4361ee" title="Blue"></div>
    <div class="theme-dot" data-color="#e63946" style="background:#e63946" title="Red"></div>
    <div class="theme-dot" data-color="#2dc653" style="background:#2dc653" title="Green"></div>
    <div class="theme-dot" data-color="#9b2dca" style="background:#9b2dca" title="Purple"></div>
  </div>

  <!-- Generate Button (color follows theme) -->
  <button class="btn-gen" id="genBtn" onclick="generateQR()" style="background:#000;color:#fff;">
    ⚡ Generate QR Code
  </button>

  <!-- QR Result -->
  <div class="qr-result" id="qrResult">
    <div class="qr-box">
      <canvas id="qrCanvas"></canvas>
    </div>
    <div class="qr-url" id="qrUrl"></div>
    <div class="dl-row">
      <button class="btn-dl btn-png" onclick="downloadQR('png')">⬇ Download PNG</button>
      <button class="btn-dl btn-jpg" id="btnJpg" onclick="downloadQR('jpg')">⬇ Download JPG</button>
    </div>
    <button class="btn-clear" onclick="clearQR()">✕ Clear</button>
  </div>

</div>

<div class="footer">© 2026 Hyper Link — Developed by Hyper</div>

<script>
  let currentColor = '#000000';
  let qrDataUrl = '';

  // Theme dot selection
  document.getElementById('themeRow').addEventListener('click', function(e) {
    const dot = e.target.closest('.theme-dot');
    if (!dot) return;
    document.querySelectorAll('.theme-dot').forEach(d => d.classList.remove('active'));
    dot.classList.add('active');
    currentColor = dot.dataset.color;

    // Update button color
    const btn = document.getElementById('genBtn');
    btn.style.background = currentColor;
    btn.style.color = '#fff';

    // Update JPG download button accent
    document.getElementById('btnJpg').style.background = currentColor;

    // Re-generate if QR already shown
    const result = document.getElementById('qrResult');
    if (result.classList.contains('show')) generateQR(true);
  });

  // Enter key
  document.getElementById('urlInput').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') generateQR();
  });

  function generateQR(silent = false) {
    const url = document.getElementById('urlInput').value.trim();
    if (!url) {
      if (!silent) { shake(document.querySelector('.input-wrap')); }
      return;
    }

    const SIZE = 200;
    const canvas = document.getElementById('qrCanvas');
    canvas.width  = SIZE;
    canvas.height = SIZE;

    // Use QRCode library to get the module matrix
    // We draw on canvas manually for color + white background
    try {
      // Generate via hidden div trick
      const tmp = document.createElement('div');
      tmp.style.cssText = 'position:absolute;left:-9999px;';
      document.body.appendChild(tmp);

      new QRCode(tmp, {
        text:         url,
        width:        SIZE,
        height:       SIZE,
        colorDark:    currentColor,
        colorLight:   '#ffffff',
        correctLevel: QRCode.CorrectLevel.H,
      });

      // Wait a tick then copy to our canvas
      setTimeout(() => {
        const src = tmp.querySelector('canvas') || tmp.querySelector('img');
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(0, 0, SIZE, SIZE);

        if (src && src.tagName === 'CANVAS') {
          ctx.drawImage(src, 0, 0, SIZE, SIZE);
        } else if (src && src.tagName === 'IMG') {
          const img = new Image();
          img.onload = () => { ctx.drawImage(img, 0, 0, SIZE, SIZE); };
          img.src = src.src;
        }

        document.body.removeChild(tmp);

        // Show result
        const display = url.length > 45 ? url.slice(0, 42) + '...' : url;
        document.getElementById('qrUrl').textContent = display;
        document.getElementById('qrResult').classList.add('show');
      }, 100);

    } catch(err) {
      alert('Could not generate QR. Check the URL.');
    }
  }

  function downloadQR(format) {
    const canvas = document.getElementById('qrCanvas');
    const url    = document.getElementById('urlInput').value.trim();
    if (!url) return;

    let dataUrl, filename;

    if (format === 'jpg') {
      // For JPG: draw white bg then QR (JPG doesn't support transparency)
      const tmp = document.createElement('canvas');
      tmp.width  = canvas.width;
      tmp.height = canvas.height;
      const ctx  = tmp.getContext('2d');
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, 0, tmp.width, tmp.height);
      ctx.drawImage(canvas, 0, 0);
      dataUrl  = tmp.toDataURL('image/jpeg', 0.95);
      filename = 'hyperlink-qr.jpg';
    } else {
      dataUrl  = canvas.toDataURL('image/png');
      filename = 'hyperlink-qr.png';
    }

    const a = document.createElement('a');
    a.href     = dataUrl;
    a.download = filename;
    a.click();
  }

  function clearQR() {
    document.getElementById('urlInput').value = '';
    document.getElementById('qrResult').classList.remove('show');
    document.getElementById('qrUrl').textContent = '';
    const canvas = document.getElementById('qrCanvas');
    canvas.getContext('2d').clearRect(0, 0, canvas.width, canvas.height);
  }

  function shake(el) {
    el.style.animation = 'none';
    el.style.borderColor = '#e74c3c';
    setTimeout(() => { el.style.borderColor = ''; }, 1000);
  }
</script>
</body>
</html>
