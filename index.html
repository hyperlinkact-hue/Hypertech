<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Request an Appointment</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="form-card">
            <h1>Request an Appointment</h1>
            <p class="subtitle">Fill out the form below and our team will contact you shortly.</p>
            
            <form id="appointmentForm">
                <div class="form-group">
                    <label for="name">Full Name *</label>
                    <input type="text" id="name" name="name" required placeholder="Enter your full name">
                </div>
                
                <div class="form-group">
                    <label for="mobile">Mobile Number *</label>
                    <input type="tel" id="mobile" name="mobile" required placeholder="Enter your mobile number">
                </div>
                
                <button type="submit" class="submit-btn">Submit Request</button>
            </form>
            
            <div id="successMessage" class="success-message" style="display: none;">
                Thank you! We received your request. Our team will call you soon.
            </div>
            
            <div id="errorMessage" class="error-message" style="display: none;"></div>
            
            <div class="privacy-note">
                <small>Your information is secure and will only be used to contact you about your appointment request.</small>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <script src="app.js"></script>
</body>
</html>
